<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pollution Monitoring Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

<style>

body.dark{
background:#121212;
color:#eeeeee;
}

.stat-card{
text-align:center;
padding:15px;
font-size:18px;
font-weight:600;
border-radius:12px;
}

.stat-number{
font-size:28px;
font-weight:700;
}

</style>

</head>

<body>

<div class="container">

<h1 class="text-center mt-4">Pollution Monitoring Dashboard (2.5 Data Points)</h1>

<div class="row mt-4">

<div class="col-md-3">
<label>Date</label>
<input type="date" id="dateFilter" class="form-control">
</div>

<div class="col-md-3">
<label>Range</label>
<select id="rangeSelect" class="form-control">
<option value="day">Day</option>
</select>
</div>

<div class="col-md-3">

<label class="visually-hidden">Sort</label>

<div class="form-check visually-hidden">
<input type="radio" name="sortOrder" value="desc" checked class="form-check-input">
<label class="form-check-label">Newest First</label>
</div>

<div class="form-check visually-hidden">
<input type="radio" name="sortOrder" value="asc" class="form-check-input">
<label class="form-check-label">Oldest First</label>
</div>
<button class="btn btn-success mt-4 w-100" onclick="window.location.href='10-data.html'">Switch to 10 Data Points</button>
</div>

<div class="col-md-3 visually-hidden">

<label>Display</label> <br> <button id="darkToggle" class="btn btn-secondary btn-sm">
Toggle Dark Mode </button>

</div>

</div>

<div class="row mt-4">

<div class="col-md-3">
<div class="card stat-card">
Average
<div id="avgValue" class="stat-number">--</div>
</div>
</div>

<div class="col-md-3">
<div class="card stat-card">
Minimum
<div id="minValue" class="stat-number">--</div>
</div>
</div>

<div class="col-md-3">
<div class="card stat-card">
Maximum
<div id="maxValue" class="stat-number">--</div>
</div>
</div>

<div class="col-md-3">
<div class="card stat-card">
Latest
<div id="latestValue" class="stat-number">--</div>
</div>
</div>

</div>

<div class="mt-5">
<canvas id="pollutionChart"></canvas>
</div>

<div id="data" class="mt-4"></div>

</div>

<script src="scripts/2dot5.js"></script>

</body>
</html>
