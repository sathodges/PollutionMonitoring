<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pollution Monitor</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Air Quality Monitor</h1>
      <p>Select the pollution data you want to view</p>

      <div class="button-group">
        <button id="pm25" aria-label="View PM2.5 data">
          2.5 Data Points
        </button>

        <button id="pm10" aria-label="View PM10 data">
          10 Data Points
        </button>
      </div>
    </section>
  </main>

  <script src="scripts/splashpage.js"></script>
</body>
</html>
