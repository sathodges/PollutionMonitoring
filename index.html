<!DOCTYPE html>
<html>
    <head>
        <title>Pollution Monitoring</title>
        <meta name="viewport" content="width=device-width, initial-scale=0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src="script.js"></script>
    </head>
    <body>
        <div class="container">
            <h1 class="text-center mt-4">Pollution Monitoring</h1>
            <div class="mt-4">
                <label for="dateFilter" class="form-label">Filter by Date:</label>
                <input type="date" id="dateFilter" class="form-control" />

                <div class="mt-3">
                    <label class="form-label">Sort Order:</label>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="sortOrder" id="sortDesc" value="desc" checked>
                        <label class="form-check-label" for="sortDesc">
                            Newest First (Descending)
                        </label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="sortOrder" id="sortAsc" value="asc">
                        <label class="form-check-label" for="sortAsc">
                            Oldest First (Ascending)
                        </label>
                    </div>
                </div>
                <h4 class="mt-3" id="averageResult"></h4>
            </div>
            <div class="container" id="data"></div>
        </div>
    </body>
</html>
